name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sample benchmark
        run: python3 evaluation/runner.py --input examples/sample_model_outputs.json --output results/sample_report.json

      - name: Run accountability benchmark
        run: python3 evaluation/runner.py --input examples/sample_accountability_receipts.json --output results/sample_accountability_report.json

      - name: Run tests
        run: pytest
